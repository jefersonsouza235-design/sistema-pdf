<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema PDF</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f1c2e, #2e5aac);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 360px;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h1 {
            margin-top: 0;
            color: #1a2a44;
            font-size: 24px;
        }

        p.sub {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #d0d7e2;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e5aac;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .erro {
            margin-top: 14px;
            color: #b42318;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Acesso ao sistema</h1>
        <p class="sub">Entre com seu usuário e senha para continuar.</p>

        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        {% if mensagem %}
            <div class="erro">{{ mensagem }}</div>
        {% endif %}
    </div>
</body>
</html>
