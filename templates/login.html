<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radar Trabalhista - Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f1c2e, #2e5aac);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            width: 380px;
            padding: 34px;
            border-radius: 16px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.25);
        }

        .brand {
            font-size: 13px;
            font-weight: bold;
            color: #2e5aac;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 8px;
            color: #1a2a44;
            font-size: 26px;
        }

        p.sub {
            color: #667085;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #d0d7e2;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e5aac;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #24498f;
        }

        .erro {
            margin-top: 14px;
            color: #b42318;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">RADAR TRABALHISTA</div>
        <h1>Acesse a plataforma</h1>
        <p class="sub">Relatórios executivos automatizados para acompanhamento trabalhista, compliance e tomada de decisão.</p>

        <form method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        {% if mensagem %}
            <div class="erro">{{ mensagem }}</div>
        {% endif %}
    </div>
</body>
</html>
