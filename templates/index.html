<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Trabalhista</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        .header { background: #1a2a44; color: white; padding: 20px; font-size: 20px; }
        .container { padding: 30px; }
        .card {
            background: white; padding: 20px; border-radius: 8px;
            max-width: 700px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        input { width: 100%; padding: 12px; margin: 12px 0; }
        button {
            background: #2e5aac; color: white; border: none;
            padding: 12px 20px; cursor: pointer; border-radius: 6px;
        }
        .msg { margin-top: 16px; color: #1a2a44; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">Dashboard Trabalhista – Positivo Tecnologia</div>
    <div class="container">
        <div class="card">
            <h3>Gerar e enviar relatório</h3>
            <form method="POST">
                <input type="text" name="email" placeholder="email1@exemplo.com, email2@exemplo.com">
                <button type="submit">Gerar e Enviar PDF</button>
            </form>
            <div class="msg">{{ mensagem }}</div>
        </div>
    </div>
</body>
</html>
